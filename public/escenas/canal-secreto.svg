<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#3a2a1c"/>
      <stop offset="45%" stop-color="#1b1a24"/>
      <stop offset="100%" stop-color="#0e0f17"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3cf"/>
      <stop offset="40%" stop-color="#f4b14a"/>
      <stop offset="100%" stop-color="#f4b14a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe6d2"/>
      <stop offset="100%" stop-color="#cdbfa2"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- noche cálida -->
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- halo de la vela -->
  <circle cx="438" cy="150" r="150" fill="url(#flame)" opacity="0.5"/>

  <!-- mesa -->
  <rect x="0" y="250" width="640" height="110" fill="#15131a"/>
  <rect x="0" y="250" width="640" height="3" fill="#2a2230"/>

  <!-- carta / sobre, en perspectiva -->
  <g transform="rotate(-7 250 235)">
    <rect x="150" y="190" width="210" height="135" rx="4" fill="url(#paper)" stroke="#b6a987" stroke-width="1.5"/>
    <path d="M150 195 L255 262 L360 195" fill="none" stroke="#b6a987" stroke-width="2"/>
    <!-- líneas de escritura -->
    <g stroke="#9c8f72" stroke-width="2" opacity="0.5" stroke-linecap="round">
      <line x1="172" y1="285" x2="300" y2="285"/>
      <line x1="172" y1="298" x2="330" y2="298"/>
      <line x1="172" y1="311" x2="270" y2="311"/>
    </g>
    <!-- sello de lacre -->
    <circle cx="255" cy="250" r="17" fill="#9c3b2e"/>
    <circle cx="255" cy="250" r="17" fill="none" stroke="#c4543f" stroke-width="2"/>
    <circle cx="255" cy="250" r="7" fill="none" stroke="#e08566" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- vela -->
  <rect x="430" y="170" width="16" height="86" rx="3" fill="#e7dcc4"/>
  <rect x="430" y="170" width="6" height="86" fill="#fff4dd" opacity="0.6"/>
  <line x1="438" y1="170" x2="438" y2="160" stroke="#3a3024" stroke-width="2"/>
  <path d="M438 162 q-8 -16 0 -30 q8 14 0 30" fill="#ffd27a" filter="url(#soft)"/>
  <path d="M438 160 q-4 -10 0 -20 q4 10 0 20" fill="#fff6d8"/>

  <!-- viñeta -->
  <rect width="640" height="360" fill="url(#glow)" opacity="0" />
  <rect width="640" height="70" fill="#0e0f17" opacity="0.55"/>
  <rect y="300" width="640" height="60" fill="#0e0f17" opacity="0.5"/>
</svg>
